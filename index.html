<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D Print Cost Pro</title>
  <style>
    /* ... (твои стили без изменений) */
    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --success: #059669;
      --danger: #dc2626;
      --warning: #d97706;
      --bg-gradient: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-secondary: #64748b;
      --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      padding: 20px 16px;
      min-height: 100vh;
    }
    .container { max-width: 600px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 24px; }
    h1 { font-size: 1.7rem; font-weight: 700; margin: 0; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .subtitle { font-size: 0.95rem; color: var(--text-secondary); margin-top: 6px; }
    .result-card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      box-shadow: var(--shadow);
      margin-bottom: 28px;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .result-value { font-size: 2.5rem; font-weight: 800; color: var(--primary); line-height: 1.1; margin-bottom: 8px; }
    .result-label { font-size: 1rem; color: var(--text-secondary); }
    .breakdown { display: flex; justify-content: space-around; margin-top: 16px; flex-wrap: wrap; gap: 8px; }
    .breakdown-item { background: #f8fafc; padding: 8px 12px; border-radius: 12px; font-size: 0.85rem; display: flex; flex-direction: column; align-items: center; min-width: 70px; }
    .breakdown-icon { font-size: 1.2em; margin-bottom: 4px; }
    .breakdown-value { font-weight: 600; color: var(--success); }
    .section-title { font-size: 1.1rem; font-weight: 700; margin: 24px 0 16px 0; display: flex; align-items: center; gap: 8px; color: var(--primary); }
    .form-row { display: flex; align-items: center; margin-bottom: 14px; gap: 10px; flex-wrap: wrap; }
    label { flex: 0 0 140px; font-weight: 600; color: var(--text-main); }
    input {
      flex: 1;
      min-width: 120px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #cbd5e0;
      font-size: 1.05rem;
      outline: none;
      background: white;
      transition: all 0.2s;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
    .actions { margin: 28px 0; display: flex; flex-direction: column; gap: 12px; }
    .btn {
      padding: 14px 20px;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      width: 100%;
    }
    .btn-primary { background: var(--primary); color: white; box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2); }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); }
    .btn-secondary { background: #f1f5f9; color: var(--text-main); }
    .btn-secondary:hover { background: #e2e8f0; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-danger:hover { background: #b91c1c; }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: #047857; }
    .history { margin-top: 32px; }
    .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .history-title { font-size: 1.2rem; font-weight: 700; color: var(--text-main); }
    .badge { background: var(--primary); color: white; padding: 4px 10px; border-radius: 16px; font-size: 0.85rem; font-weight: 600; }
    .empty { text-align: center; color: var(--text-secondary); padding: 40px 0; background: white; border-radius: 16px; margin-top: 12px; }
    .history-list { display: flex; flex-direction: column; gap: 12px; }
    .history-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 16px 18px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.04);
      transition: all 0.2s;
    }
    .history-card:hover { transform: translateY(-2px); box-shadow: 0 8px 12px rgba(0,0,0,0.08); }
    .history-header-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .history-time { font-size: 0.85rem; color: var(--text-secondary); }
    .history-total { font-size: 1.3rem; font-weight: 800; color: var(--primary); }
    .history-details { font-size: 0.9rem; color: var(--text-secondary); display: flex; gap: 10px; flex-wrap: wrap; }
    .history-tag { background: #f1f5f9; padding: 2px 8px; border-radius: 8px; }
    footer { text-align: center; margin-top: 40px; padding-top: 24px; border-top: 1px solid #e2e8f0; }
    .theme-toggle { display: inline-flex; align-items: center; gap: 8px; color: var(--text-secondary); font-size: 0.95rem; cursor: pointer; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    .pulse { animation: pulse 0.5s ease; }
    @media (max-width: 480px) {
      h1 { font-size: 1.5rem; }
      .result-value { font-size: 2.1rem; }
      .form-row { flex-direction: column; align-items: flex-start; }
      label { width: 100%; margin-bottom: 6px; }
      input { width: 100%; box-sizing: border-box; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🖨️ 3D Print Cost Pro</h1>
      <div class="subtitle">Рассчитай себестоимость 3D-печати за 5 секунд</div>
    </header>

    <div class="result-card">
      <div class="result-value" id="resultValue">0,00 ₽</div>
      <div class="result-label">Итоговая себестоимость</div>
      <div class="breakdown">
        <div class="breakdown-item">
          <span class="breakdown-icon">⚡</span>
          <span class="breakdown-value" id="elCost">0.00 ₽</span>
        </div>
        <div class="breakdown-item">
          <span class="breakdown-icon">📦</span>
          <span class="breakdown-value" id="plasticCost">0.00 ₽</span>
        </div>
        <div class="breakdown-item">
          <span class="breakdown-icon">🛡️</span>
          <span class="breakdown-value" id="deprService">0.00 ₽</span>
        </div>
      </div>
    </div>

    <h2 class="section-title">⚙️ Данные для расчёта</h2>
    <div class="form-row"><label>⏱️ Время (часы)</label><input type="number" id="h" value="0" min="0" step="1"></div>
    <div class="form-row"><label>⏱️ Время (минуты)</label><input type="number" id="m" value="0" min="0" max="59" step="1"></div>
    <div class="form-row"><label>⚡ Цена эл-ва (₽/кВт·ч)</label><input type="number" id="电价" value="5.0" step="0.1"></div>
    <div class="form-row"><label>🔌 Мощность (Вт)</label><input type="number" id="power" value="200" step="10"></div>
    <div class="form-row"><label>🧱 Пластик (г)</label><input type="number" id="grams" value="100" step="1"></div>
    <div class="form-row"><label>💰 Стоимость пластика/кг (₽)</label><input type="number" id="plasticPrice" value="250" step="10"></div>
    <div class="form-row"><label>🛡️ Амортизация (₽)</label><input type="number" id="depr" value="0" step="10"></div>
    <div class="form-row"><label>🔧 Обслуживание (₽)</label><input type="number" id="service" value="0" step="10"></div>

    <div class="actions">
      <button class="btn btn-primary" onclick="calculate()">📊 Рассчитать</button>
      <button class="btn btn-secondary" onclick="exportCSV()">📤 Экспорт в CSV</button>
      <button class="btn btn-danger" onclick="clearHistory()">❌ Очистить</button>
    </div>

    <div class="history">
      <div class="history-header">
        <div class="history-title">📜 История расчётов</div>
        <div class="badge" id="historyCount">0</div>
      </div>
      <div id="historyList" class="empty">История пуста. Рассчитай первую модель!</div>
    </div>

    <footer>
      <label class="theme-toggle" onclick="toggleTheme()">
        <span id="themeIcon">🌙</span> Переключить тему
      </label>
      <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 12px;">
        © 2024 3D Print Cost Pro | Все данные хранятся на устройстве
      </div>
    </footer>
  </div>

  <script>
    // ——— Логика ———
    const STORAGE_KEY = 'printCostHistory_v3';
    
    function get() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    function save(history) { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); render(); }
    
    function formatRUB(amount) {
      return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 2 }).format(amount);
    }
    
    function calculate() {
      const h = parseFloat(document.getElementById('h').value) || 0;
      const m = parseFloat(document.getElementById('m').value) || 0;
      const电价 = parseFloat(document.getElementById('电价').value) || 0;
      const power = parseFloat(document.getElementById('power').value) || 0;
      const grams = parseFloat(document.getElementById('grams').value) || 0;
      const price = parseFloat(document.getElementById('plasticPrice').value) || 0;
      const depr = parseFloat(document.getElementById('depr').value) || 0;
      const service = parseFloat(document.getElementById('service').value) || 0;
      
      const totalH = h + m / 60;
      const elCost = totalH * (power / 1000) *电价;
      const plasticCost = grams / 1000 * price;
      const total = elCost + plasticCost + depr + service;
      
      const resultValue = document.getElementById('resultValue');
      resultValue.textContent = formatRUB(total);
      resultValue.classList.remove('pulse');
      void resultValue.offsetWidth;
      resultValue.classList.add('pulse');

      document.getElementById('elCost').textContent = formatRUB(elCost);
      document.getElementById('plasticCost').textContent = formatRUB(plasticCost);
      document.getElementById('deprService').textContent = formatRUB(depr + service);

      const record = {
      time: new Date().toLocaleString('ru-RU', { dateStyle: 'medium', timeStyle: 'short' }),
      timeH: `${h}ч ${m}мин`,
      plastic: grams,
      elCost: elCost.toFixed(2),   // строка (для отображения)
      plasticCost: plasticCost.toFixed(2),
      total: total.toFixed(2),
      depr: depr.toFixed(2),        // ✅ добавлено напрямую
      service: service.toFixed(2)   // ✅ добавлено напрямую
    };
      
      const history = get();
      history.unshift(record);
      if (history.length > 50) history.pop();
      save(history);
    }

     function render() {
      const list = document.getElementById('historyList');
      const history = get();
      document.getElementById('historyCount').textContent = history.length;

      if (!history.length) {
        list.innerHTML = '<div class="empty">История пуста. Рассчитай первую модель! 🚀</div>';
        return;
      }

      list.innerHTML = history.map(r => `
        <div class="history-card">
          <div class="history-header-row">
            <div class="history-time">🕒 ${r.time}</div>
            <div class="history-total">${formatRUB(parseFloat(r.total))}</div>
          </div>
          <div class="history-details">
            <span class="history-tag">⏱️ ${r.timeH}</span>
            <span class="history-tag">📦 ${r.plastic}г</span>
            <span class="history-tag">⚡ ${r.elCost}₽</span>
            <span class="history-tag">🛡️ ${r.depr}₽</span>
            <span class="history-tag">🔧 ${r.service}₽</span>
          </div>
        </div>
      `).join('');
    }

    function clearHistory() {
      if (confirm('Удалить всю историю? Это действие необратимо.')) {
        localStorage.removeItem(STORAGE_KEY);
        
        // Сброс полей ввода (не обязательно, но полезно)
        document.getElementById('h').value = 0;
        document.getElementById('m').value = 0;
        document.getElementById('电价').value = 5.0;
        document.getElementById('power').value = 200;
        document.getElementById('grams').value = 100;
        document.getElementById('plasticPrice').value = 250;
        document.getElementById('depr').value = 0;
        document.getElementById('service').value = 0;
    
        // Сброс результатов
        document.getElementById('resultValue').textContent = '0,00 ₽';
        document.getElementById('elCost').textContent = '0.00 ₽';
        document.getElementById('plasticCost').textContent = '0.00 ₽';
        document.getElementById('deprService').textContent = '0.00 ₽';
    
        render();
      }
    }

    function exportCSV() {
      const history = get();
      if (!history.length) {
        alert('Нет данных для экспорта.');
        return;
      }

      let csv = 'Дата,Время,Пластик (г),Эл-во (₽),Пластик (₽),Амортизация (₽),Обслуживание (₽),Итог (₽)\r\n';
      history.forEach(r => {
        csv += `"${r.time}","${r.timeH}",${r.plastic},${r.elCost},${r.plasticCost},${r.depr},${r.service},${r.total}\r\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.setAttribute('href', url);
      link.setAttribute('download', '3d_print_history.csv');
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark');
      document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙';
      document.body.style.setProperty('--bg-gradient', isDark 
        ? 'linear-gradient(135deg, #1e293b 0%, #0f172a 100%)' 
        : 'linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%)');
      document.body.style.setProperty('--card-bg', isDark ? '#1e293b' : '#ffffff');
      document.body.style.setProperty('--text-main', isDark ? '#f1f5f9' : '#1e293b');
      document.body.style.setProperty('--text-secondary', isDark ? '#94a3b8' : '#64748b');
    }

    // ——— Инициализация ———
    render(); // загрузить историю при старте
  </script>
</body>
</html>
