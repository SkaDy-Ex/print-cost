<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="style.css">
  <title>3D Print Cost Pro</title>
</head>
<body>
  <div class="container">
    <header>
      <h1>🖨️ 3D Print Cost Pro</h1>
      <div class="subtitle">Рассчитай себестоимость 3D-печати за 5 секунд</div>
    </header>

    <div class="result-card">
      <div class="result-value" id="resultValue">0,00 ₽</div>
      <div class="result-label">Итоговая себестоимость</div>
      <div class="breakdown">
        <div class="breakdown-item">
          <span class="breakdown-icon">⚡</span>
          <span class="breakdown-value" id="elCost">0.00 ₽</span>
        </div>
        <div class="breakdown-item">
          <span class="breakdown-icon">📦</span>
          <span class="breakdown-value" id="plasticCost">0.00 ₽</span>
        </div>
        <div class="breakdown-item">
          <span class="breakdown-icon">🛡️</span>
          <span class="breakdown-value" id="deprService">0.00 ₽</span>
        </div>
      </div>
    </div>

    <h2 class="section-title">⚙️ Данные для расчёта</h2>
    <div class="form-row"><label>⏱️ Время (часы)</label><input type="number" id="h" value="0" min="1" step="1"></div>
    <div class="form-row"><label>⏱️ Время (минуты)</label><input type="number" id="m" value="0" min="30" max="59" step="1"></div>
    <div class="form-row"><label>⚡ Цена эл-ва (₽/кВт·ч)</label><<input type="number" id="priceElectricity" value="3.0" step="0.1"></div>
    <div class="form-row"><label>🔌 Мощность (Вт)</label><input type="number" id="power" value="250" step="10"></div>
    <div class="form-row"><label>🧱 Пластик (г)</label><input type="number" id="grams" value="10" step="1"></div>
    <div class="form-row"><label>💰 Стоимость пластика/кг (₽)</label><input type="number" id="plasticPrice" value="1500" step="10"></div>
    <div class="form-row"><label>🛡️ Амортизация (₽)</label><input type="number" id="depr" value="6" step="10"></div>
    <div class="form-row"><label>🔧 Обслуживание (₽)</label><input type="number" id="service" value="5" step="10"></div>

    <div class="actions">
      <button class="btn btn-primary" onclick="calculate()">📊 Рассчитать</button>
      <button class="btn btn-secondary" onclick="exportCSV()">📤 Экспорт в CSV</button>
      <button class="btn btn-danger" onclick="clearHistory()">❌ Очистить</button>
    </div>

    <div class="history">
      <div class="history-header">
        <div class="history-title">📜 История расчётов</div>
        <div class="badge" id="historyCount">0</div>
      </div>
      <div id="historyList" class="empty">История пуста. Рассчитай первую модель!</div>
    </div>

    <footer>
      <label class="theme-toggle" onclick="toggleTheme()">
        <span id="themeIcon">🌙</span> Переключить тему
      </label>
      <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 12px;">
        © 2024 3D Print Cost Pro | Все данные хранятся на устройстве
      </div>
    </footer>
  </div>

  <script>
    // ——— Логика ———
    const STORAGE_KEY = 'printCostHistory_v3';
    
    function get() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    function save(history) { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); render(); }
    
    function formatRUB(amount) {
      return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB', maximumFractionDigits: 2 }).format(amount);
    }
    
    function calculate() {
      const h = parseFloat(document.getElementById('h').value) || 0;
      const m = parseFloat(document.getElementById('m').value) || 0;
      const priceElectricity = parseFloat(document.getElementById('priceElectricity').value) || 0;
      const power = parseFloat(document.getElementById('power').value) || 0;
      const grams = parseFloat(document.getElementById('grams').value) || 0;
      const price = parseFloat(document.getElementById('plasticPrice').value) || 0;
      const depr = parseFloat(document.getElementById('depr').value) || 0;
      const service = parseFloat(document.getElementById('service').value) || 0;
      
      const totalH = h + m / 60;
      const elCost = totalH * (power / 1000) * priceElectricity;
      const plasticCost = grams / 1000 * plasticPrice;
      // Амортизация и обслуживание — по часам
      const total = elCost + plasticCost + (depr + service) * totalH;
            
      const resultValue = document.getElementById('resultValue');
      resultValue.textContent = formatRUB(total);
      resultValue.classList.remove('pulse');
      void resultValue.offsetWidth;
      resultValue.classList.add('pulse');

      document.getElementById('elCost').textContent = formatRUB(elCost);
      document.getElementById('plasticCost').textContent = formatRUB(plasticCost);
      document.getElementById('deprService').textContent = formatRUB(depr + service);

      const record = {
      time: new Date().toLocaleString('ru-RU', { dateStyle: 'medium', timeStyle: 'short' }),
      timeH: `${h}ч ${m}мин`,
      plastic: grams,
      elCost: elCost.toFixed(2),   // строка (для отображения)
      plasticCost: plasticCost.toFixed(2),
      total: total.toFixed(2),
      depr: depr.toFixed(2),        // ✅ добавлено напрямую
      service: service.toFixed(2)   // ✅ добавлено напрямую
    };
      
      const history = get();
      history.unshift(record);
      if (history.length > 50) history.pop();
      save(history);
    }

     function render() {
      const list = document.getElementById('historyList');
      const history = get();
      document.getElementById('historyCount').textContent = history.length;

      if (!history.length) {
        list.innerHTML = '<div class="empty">История пуста. Рассчитай первую модель! 🚀</div>';
        return;
      }

      list.innerHTML = history.map(r => `
        <div class="history-card">
          <div class="history-header-row">
            <div class="history-time">🕒 ${r.time}</div>
            <div class="history-total">${formatRUB(parseFloat(r.total))}</div>
          </div>
          <div class="history-details">
            <span class="history-tag">⏱️ ${r.timeH}</span>
            <span class="history-tag">📦 ${r.plastic}г</span>
            <span class="history-tag">⚡ ${r.elCost}₽</span>
            <span class="history-tag">🛡️ ${r.depr}₽</span>
            <span class="history-tag">🔧 ${r.service}₽</span>
          </div>
        </div>
      `).join('');
    }

    function clearHistory() {
      if (confirm('Удалить всю историю? Это действие необратимо.')) {
        localStorage.removeItem(STORAGE_KEY);
        
        // Обнулить поля ввода (с новыми значениями по умолчанию)
        document.getElementById('h').value = 0;
        document.getElementById('m').value = 0;
        document.getElementById('priceElectricity').value = 3.0;  // ← обновлено
        document.getElementById('power').value = 250;             // ← 0.25 кВт
        document.getElementById('grams').value = 10;
        document.getElementById('plasticPrice').value = 1500;     // ← обновлено
        document.getElementById('depr').value = 6;                // ← 6 ₽/час
        document.getElementById('service').value = 5;             // ← 5 ₽/час

        // Сброс отображения
        document.getElementById('resultValue').textContent = '0,00 ₽';
        document.getElementById('elCost').textContent = '0.00 ₽';
        document.getElementById('plasticCost').textContent = '0.00 ₽';
        document.getElementById('deprService').textContent = '0.00 ₽';

        render();
      }
    }

    function exportCSV() {
      const history = get();
      if (!history.length) {
        alert('Нет данных для экспорта.');
        return;
      }

      let csv = 'Дата,Время,Пластик (г),Эл-во (₽),Пластик (₽),Амортизация (₽),Обслуживание (₽),Итог (₽)\r\n';
      history.forEach(r => {
        csv += `"${r.time}","${r.timeH}",${r.plastic},${r.elCost},${r.plasticCost},${r.depr},${r.service},${r.total}\r\n`;
      });

      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.setAttribute('href', url);
      link.setAttribute('download', '3d_print_history.csv');
      link.style.visibility = 'hidden';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark');
      document.getElementById('themeIcon').textContent = isDark ? '☀️' : '🌙';
      document.body.style.setProperty('--bg-gradient', isDark 
        ? 'linear-gradient(135deg, #1e293b 0%, #0f172a 100%)' 
        : 'linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%)');
      document.body.style.setProperty('--card-bg', isDark ? '#1e293b' : '#ffffff');
      document.body.style.setProperty('--text-main', isDark ? '#f1f5f9' : '#1e293b');
      document.body.style.setProperty('--text-secondary', isDark ? '#94a3b8' : '#64748b');
    }

    // ——— Инициализация ———
    render(); // загрузить историю при старте
  </script>
</body>
</html>
